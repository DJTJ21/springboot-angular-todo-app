spring:
  application:
    name: ideploy-todo-backend
  
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# CORS Configuration - Origins allowed to access the API
# For multiple origins, separate with commas: https://frontend.com,https://admin.frontend.com
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:80,http://localhost:8084,http://localhost}

logging:
  level:
    com.ideploy.todo: DEBUG
    org.hibernate.SQL: DEBUG
