<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>iDeploy - Todo List</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    // Load configuration at runtime
    fetch('/assets/config.json')
      .then(res => res.json())
      .then(config => {
        window.__APP_CONFIG__ = config;
      })
      .catch(err => console.warn('Config file not found, using defaults', err));
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
